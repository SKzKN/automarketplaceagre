<body>
  <main class="figma-landing">
    <section class="landing-hero" id="home">
      <div class="landing-shell">
        <header class="landing-header">
          <div class="landing-logo-wrap">
            <img src="assets/img/logo.png" alt="otsiauto.ee" class="landing-logo">
          </div>
          <nav class="landing-nav" aria-label="Main navigation">
            <a href="#home" class="landing-nav-link is-active">Home</a>
            <a href="search-results.html" class="landing-nav-link">Browse Cars</a>
          </nav>
          <div class="landing-tools" aria-hidden="true">
            <span class="landing-tool"><i class="flaticon-internet"></i></span>
            <span class="landing-tool"><i class="flaticon-user"></i></span>
          </div>
        </header>

        <div class="landing-content">
          <h1>Discover Your <span>Ideal Car Today</span></h1>
          <p>Search thousands of cars from trusted dealers and private sellers.</p>

          <form role="form" id="brand-search-form" class="search-form marketplace-search landing-search-form" method="get" action="search-results.html">
            <input type="hidden" name="vehicle_type" value="car">

            <div class="landing-advanced-toggle">Advance Filters</div>

            <div class="landing-search-grid">
              <div class="landing-field landing-field-select">
                <label for="body_type">Condition</label>
                <select id="body_type" name="body_type" class="form-select">
                  <option value="">Any condition</option>
                </select>
              </div>

              <div class="landing-field landing-field-select">
                <label for="make">Brand</label>
                <select id="make" name="make" class="form-select">
                  <option value="">All brands</option>
                </select>
              </div>

              <div class="landing-field landing-field-select">
                <label for="model">Model</label>
                <select id="model" name="model" class="form-select">
                  <option value="">All models</option>
                </select>
              </div>

              <div class="landing-field">
                <label for="zip_code">ZIP code</label>
                <input id="zip_code" type="text" class="form-control" placeholder="ZIP code" inputmode="numeric" autocomplete="postal-code">
              </div>

              <button class="landing-submit" type="submit">Search</button>
            </div>

            <details class="landing-advanced-panel">
              <summary>More filters</summary>
              <div class="landing-advanced-fields">
                <select name="fuel" class="form-select">
                  <option value="">Fuel</option>
                </select>
                <select name="transmission" class="form-select">
                  <option value="">Transmission</option>
                  <option value="manuaal">Manual</option>
                  <option value="automaat">Automatic</option>
                </select>
                <select name="drive_type" class="form-select">
                  <option value="">Drive</option>
                  <option value="Esivedu">FWD</option>
                  <option value="Tagavedu">RWD</option>
                  <option value="Nelikvedu">AWD</option>
                </select>
                <input type="number" name="min_price" class="form-control" placeholder="Price from" min="0" step="100">
                <input type="number" name="max_price" class="form-control" placeholder="Price to" min="0" step="100">
                <input type="number" name="min_year" class="form-control" placeholder="Year from" min="1900" max="2099">
                <input type="number" name="max_year" class="form-control" placeholder="Year to" min="1900" max="2099">
                <input type="number" name="min_mileage" class="form-control" placeholder="Mileage from" min="0" step="1000">
                <input type="number" name="max_mileage" class="form-control" placeholder="Mileage to" min="0" step="1000">
              </div>
            </details>
          </form>

          <div class="landing-count">
            <span class="landing-count-star">*</span>
            <span>Explore <strong id="hero-listings-count">...</strong> Cars Near You</span>
          </div>
        </div>
      </div>

      <div class="landing-bars" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
    </section>

    <footer class="landing-footer">
      <p>© 2026 otsiauto.ee. All rights reserved.</p>
    </footer>
